<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
    <img width="300" src="cat.jpeg" alt="cat picture">
    <hr>
    <h1><b>Register Page</b></h1>
    <form>
    <div>
        <label for="Name"><b>User Name :  </b></label><br>
        <input id="Name" type="text" placeholder="Full Name">
    </div>
    <br>
    <div>
        <label for="password"><b>Password :  </b></label><br>
        <input id="password" type="password" placeholder="*************">
    </div>
    <br>
    <div>
        <label for="number"><b>Phone Number :</b></label><br>
        <input id="number" type="number" placeholder="Enter Your Phone NUmber">
    </div>
    <br>
    <div>
        <label for="email"><b>Email address :   </b></label><br>
        <input id="email" type="email" placeholder="Enter Your Email">
    </div>
    <br>
    <div>
        <label for="age"><b>Your Age :   </b></label><br>
        <input id="age" type="number" placeholder="Enter Your Age">
    </div>
    <br>
    <button type="submit">submit</button>
    <button type="reset">reset</button>
    </form>
    <hr>
    <h2><i>the audio:</i></h2>
    <audio controls>
        <source src="audio.mp4">
    </audio>

</body>
</html>
